<svg xmlns="http://www.w3.org/2000/svg" width="375" height="220" viewBox="0 0 375 220">
  <rect width="375" height="220" rx="12" fill="#F2F2F7"/>
  <!-- Content area -->
  <rect x="20" y="15" width="335" height="140" rx="10" fill="#FFFFFF"/>
  <text x="187.5" y="80" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif" font-size="20" font-weight="600" fill="currentColor">Inicio</text>
  <text x="187.5" y="105" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif" font-size="14" fill="#8E8E93">Contenido de la pesta&#xf1;a</text>
  <!-- Tab bar -->
  <rect x="20" y="160" width="335" height="55" rx="10" fill="#FFFFFF"/>
  <line x1="20" y1="160" x2="355" y2="160" stroke="#E5E5EA" stroke-width="0.5"/>
  <!-- Tab 1 (selected) -->
  <!-- House icon -->
  <g transform="translate(86, 170)">
    <path d="M0,10 L10,2 L20,10 L20,20 L0,20 Z" fill="#007AFF" stroke="none"/>
    <rect x="7" y="13" width="6" height="7" rx="1" fill="#FFFFFF"/>
  </g>
  <text x="96" y="202" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" font-weight="500" fill="#007AFF">Inicio</text>
  <!-- Tab 2 -->
  <!-- Search icon -->
  <g transform="translate(178, 170)">
    <circle cx="9" cy="9" r="7" fill="none" stroke="#8E8E93" stroke-width="2"/>
    <line x1="14" y1="14" x2="19" y2="19" stroke="#8E8E93" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="188" y="202" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#8E8E93">Buscar</text>
  <!-- Tab 3 -->
  <!-- Person icon -->
  <g transform="translate(270, 170)">
    <circle cx="10" cy="6" r="5" fill="none" stroke="#8E8E93" stroke-width="2"/>
    <path d="M0,20 Q0,13 10,13 Q20,13 20,20" fill="none" stroke="#8E8E93" stroke-width="2"/>
  </g>
  <text x="280" y="202" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#8E8E93">Perfil</text>
</svg>