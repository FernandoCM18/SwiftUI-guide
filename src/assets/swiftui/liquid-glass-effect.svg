<svg xmlns="http://www.w3.org/2000/svg" width="375" height="280" viewBox="0 0 375 280">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <radialGradient id="blob3" cx="25%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#A5F3FC" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob4" cx="75%" cy="65%" r="50%">
      <stop offset="0%" stop-color="#C7D2FE" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <!-- Highlight gradient for glass button -->
    <linearGradient id="glass-highlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.45)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0.10)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>
    <!-- Reflection shimmer -->
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0.3)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="375" height="280" rx="16" fill="url(#bg2)"/>
  <!-- Blobs -->
  <circle cx="70" cy="90" r="100" fill="url(#blob3)"/>
  <circle cx="290" cy="180" r="110" fill="url(#blob4)"/>
  <!-- Extra accent circles -->
  <circle cx="310" cy="60" r="45" fill="#F0ABFC" fill-opacity="0.25"/>
  <circle cx="60" cy="220" r="55" fill="#67E8F9" fill-opacity="0.2"/>

  <!-- Title -->
  <text x="187" y="30" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.9)">.glassBackgroundEffect()</text>

  <!-- Phone frame context - subtle content behind -->
  <text x="60" y="90" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="700" fill="rgba(255,255,255,0.25)">Foto del</text>
  <text x="60" y="118" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="700" fill="rgba(255,255,255,0.25)">día</text>

  <!-- glassBackgroundEffect button - centered -->
  <!-- Button shadow -->
  <rect x="105" y="133" width="165" height="48" rx="24" fill="rgba(0,0,0,0.2)" filter="url(#blur)" transform="translate(0,4)"/>
  <!-- Button base glass layer -->
  <rect x="105" y="130" width="165" height="48" rx="24" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.45)" stroke-width="0.75"/>
  <!-- Glass highlight (top half) -->
  <rect x="105" y="130" width="165" height="24" rx="24" fill="url(#glass-highlight)"/>
  <!-- Shimmer reflection -->
  <rect x="105" y="130" width="165" height="48" rx="24" fill="url(#shimmer)" opacity="0.5"/>
  <!-- Inner subtle border top -->
  <rect x="106" y="131" width="163" height="2" rx="1" fill="rgba(255,255,255,0.6)"/>

  <!-- Button icon -->
  <text x="137" y="160" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="18" fill="rgba(255,255,255,0.95)">📷</text>
  <!-- Button label -->
  <text x="193" y="160" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="15" font-weight="600" fill="rgba(255,255,255,0.95)">Abrir cámara</text>

  <!-- Annotation arrow + label -->
  <line x1="187" y1="192" x2="187" y2="210" stroke="rgba(255,255,255,0.6)" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="187" y="226" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="rgba(255,255,255,0.75)">Refracción dinámica del contenido</text>
  <text x="187" y="242" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="rgba(255,255,255,0.75)">detrás del elemento</text>

  <!-- Code snippet -->
  <rect x="20" y="254" width="335" height="20" rx="6" fill="rgba(0,0,0,0.3)"/>
  <text x="36" y="268" font-family="'SF Mono', 'Menlo', monospace" font-size="11" fill="#93C5FD">Button(</text>
  <text x="87" y="268" font-family="'SF Mono', 'Menlo', monospace" font-size="11" fill="#FCA5A5">action</text>
  <text x="130" y="268" font-family="'SF Mono', 'Menlo', monospace" font-size="11" fill="#93C5FD">: {}) { ... }.</text>
  <text x="248" y="268" font-family="'SF Mono', 'Menlo', monospace" font-size="11" fill="#86EFAC">glassBackgroundEffect</text>
</svg>
